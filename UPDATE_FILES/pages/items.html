<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wild Rift Guide｜中階裝備</title>
<link rel="stylesheet" href="../assets/css/items-page.css">
</head>
<body>
<header class="topbar">
  <a class="brand" href="../index.html"><span>WILD RIFT</span><small>GUIDE</small></a>
  <nav>
    <a href="../index.html">首頁</a>
    <a class="active" href="items.html">裝備</a>
    <a href="runes.html">符文</a>
    <a href="spells.html">召喚師技能</a>
  </nav>
</header>

<main>
  <section class="hero">
    <p class="eyebrow">ITEM DATABASE</p>
    <h1>中階裝備資料庫</h1>
    <p>依照激鬥峽谷遊戲內分類顯示；同一件裝備可以同時出現在物理、魔法、防禦或輔助分類，不另外建立共用素材分類。</p>
    <div id="counts" class="counts"></div>
  </section>

  <section class="toolbar">
    <div id="tabs" class="tabs"></div>
    <label class="search"><span>搜尋</span><input id="search" placeholder="輸入裝備名稱、屬性或效果"></label>
  </section>

  <section id="grid" class="item-grid"></section>
</main>

<div id="modal" class="modal" aria-hidden="true">
  <button class="modal-backdrop" data-close aria-label="關閉"></button>
  <article class="modal-card">
    <button class="close" data-close aria-label="關閉">×</button>
    <div class="detail-head">
      <img id="detailIcon" alt="">
      <div>
        <p id="detailCategory" class="eyebrow"></p>
        <h2 id="detailName"></h2>
        <strong id="detailPrice"></strong>
      </div>
    </div>
    <ul id="detailStats" class="detail-stats"></ul>
    <p id="detailDesc" class="detail-desc"></p>
  </article>
</div>

<footer>© 2026 Wild Rift Guide</footer>
<script src="../assets/js/items-page.js"></script>
</body>
</html>
